<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodgers Insider | 洛杉矶道奇队实时资讯</title>
<meta name="description" content="Los Angeles Dodgers real-time stats, roster, player profiles, Sabermetrics. Free, powered by MLB Stats API.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚾</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#005A9C;--blue-dark:#003B6F;--blue-light:#E6F1FB;--blue-50:#F0F6FC;
  --red:#CC0000;--red-light:#FAEAEA;
  --green:#2D8B46;--green-light:#E8F5EC;
  --gold:#D4A017;--gold-light:#FFF8E7;
  --gray-50:#F8F9FA;--gray-100:#F0F1F3;--gray-200:#E0E2E6;--gray-300:#C8CBCF;
  --gray-500:#888;--gray-600:#666;--gray-700:#444;--gray-800:#1a1a1a;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,0.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,sans-serif;background:var(--gray-50);color:var(--gray-800);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
img{max-width:100%}

.header{background:var(--blue);color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.header h1 em{font-style:normal;color:var(--gold)}
.header .tag{font-size:10px;background:rgba(255,255,255,0.18);padding:2px 8px;border-radius:12px;font-weight:400}

.nav{background:#fff;border-bottom:1px solid var(--gray-200);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:50px;z-index:99;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-inner{max-width:800px;margin:0 auto;display:flex;padding:0 8px}
.nav button{flex-shrink:0;padding:12px 14px;font-size:13px;font-weight:500;border:none;background:none;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.nav button:hover{color:var(--blue)}
.nav button.active{color:var(--blue);border-bottom-color:var(--blue)}

.main{max-width:800px;margin:0 auto;padding:12px 12px 60px}
.tab{display:none}.tab.active{display:block}

.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.card-head{padding:13px 16px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--gray-100)}
.card-body{padding:14px 16px}

/* Game */
.game{padding:16px;display:flex;align-items:center;gap:8px}
.game-team{text-align:center;flex:1;min-width:0}
.game-team .name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.game-score{text-align:center;padding:0 12px;flex-shrink:0}
.game-score .runs{font-size:26px;font-weight:800;font-family:'SF Mono',Monaco,'Cascadia Code',monospace}
.game-score .at{color:var(--gray-300);font-size:20px;margin:0 2px}
.game-meta{text-align:center;flex-shrink:0;min-width:70px}
.game-meta .status{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;display:inline-block}
.s-live{background:var(--red);color:#fff;animation:pulse 2s infinite}
.s-sched{background:var(--blue-light);color:var(--blue)}
.s-final{background:var(--gray-100);color:var(--gray-600)}
.s-win{background:var(--green-light);color:var(--green)}
.s-loss{background:var(--red-light);color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.game-meta .time{font-size:11px;color:var(--gray-500);margin-top:4px}
.game .dodgers-highlight .name{color:var(--blue)}

/* Standings text */
.standings-pre{font-family:'SF Mono',Monaco,'Cascadia Code','Courier New',monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--gray-700);padding:4px 0}

/* Roster */
.roster-filters{display:flex;gap:6px;padding:10px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-100)}
.roster-filters button{padding:5px 14px;font-size:12px;border:1px solid var(--gray-200);border-radius:16px;background:#fff;color:var(--gray-600);cursor:pointer;font-weight:500;transition:all .15s}
.roster-filters button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.player-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .1s}
.player-row:hover{background:var(--blue-50)}
.player-row:last-child{border-bottom:none}
.player-num{font-size:13px;font-weight:700;color:var(--blue);width:24px;text-align:center;font-family:'SF Mono',Monaco,monospace}
.player-info{flex:1;min-width:0}
.player-name{font-size:14px;font-weight:600}
.player-meta{font-size:11px;color:var(--gray-500);margin-top:1px}
.player-stat{font-size:13px;font-weight:600;color:var(--gray-700);font-family:'SF Mono',Monaco,monospace}

/* Profile */
.profile-hero{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);color:#fff;padding:24px 16px 20px;text-align:center;position:relative}
.profile-hero .num{position:absolute;top:8px;right:16px;font-size:48px;font-weight:900;opacity:.12;font-family:'SF Mono',monospace}
.profile-hero .pname{font-size:24px;font-weight:700;margin-top:4px}
.profile-hero .pteam{font-size:13px;opacity:.8;margin-top:2px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--gray-200)}
.profile-cell{background:#fff;padding:12px 14px}
.profile-cell .lbl{font-size:10px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.profile-cell .val{font-size:14px;font-weight:600}
.profile-stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--gray-200)}
.profile-stat{text-align:center;background:#fff;padding:10px 6px}
.profile-stat .n{font-size:18px;font-weight:700;color:var(--blue);font-family:'SF Mono',monospace}
.profile-stat .t{font-size:10px;color:var(--gray-500);margin-top:2px}

/* Search */
.search-wrap{padding:10px 16px}
.search-input{width:100%;padding:10px 16px;border:1px solid var(--gray-200);border-radius:20px;font-size:14px;outline:none;transition:border .2s;background:#fff}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,90,156,.1)}

/* News */
.news-row{padding:12px 16px;border-bottom:1px solid var(--gray-100);display:block;text-decoration:none;color:inherit}
.news-row:hover{background:var(--blue-50)}
.news-row:last-child{border-bottom:none}
.news-title{font-size:13px;font-weight:600;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-date{font-size:11px;color:var(--gray-500);margin-top:3px}

/* Loading */
.loading{text-align:center;padding:48px 20px;color:var(--gray-500);font-size:13px}
.spinner{width:28px;height:28px;border:3px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

.err{text-align:center;padding:20px 16px;background:var(--red-light);border-radius:var(--radius);margin:8px 0;font-size:13px;color:#a33}

.empty{text-align:center;padding:40px 20px;color:var(--gray-500);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:.5}

.back-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;font-size:13px;color:var(--blue);cursor:pointer;border:none;background:none;font-weight:500;border-radius:6px}
.back-btn:hover{background:var(--blue-50)}

.text-report{font-family:'SF Mono',Monaco,'Cascadia Code','Courier New',monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;color:var(--gray-700)}

.footer{text-align:center;padding:20px 16px;font-size:11px;color:var(--gray-500)}
.footer a{color:var(--blue);font-weight:500}

@media(min-width:600px){
  .profile-stats-bar{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1><em>LA</em> Dodgers Insider</h1>
    <span class="tag">MLB Stats API</span>
  </div>
</div>

<div class="nav">
  <div class="nav-inner">
    <button class="active" data-tab="today">Today</button>
    <button data-tab="standings">Standings</button>
    <button data-tab="roster">Roster</button>
    <button data-tab="player">Player</button>
    <button data-tab="saber">Saber</button>
    <button data-tab="news">News</button>
  </div>
</div>

<div class="main">
  <div class="tab active" id="tab-today"></div>
  <div class="tab" id="tab-standings"></div>
  <div class="tab" id="tab-roster"></div>
  <div class="tab" id="tab-player"></div>
  <div class="tab" id="tab-saber"></div>
  <div class="tab" id="tab-news"></div>
</div>

<div class="footer">Powered by <a href="https://dodgers-api.onrender.com/docs" target="_blank">Dodgers Insider API</a> &middot; Free &amp; Real-time</div>

<script>
const API='https://dodgers-api.onrender.com';
let curTab='today',rosterView='all';

document.querySelectorAll('.nav button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    const t=b.dataset.tab;
    document.getElementById('tab-'+t).classList.add('active');
    curTab=t; loadTab(t);
  };
});

function loadTab(t){
  const el=document.getElementById('tab-'+t);
  ({today:loadToday,standings:loadStandings,roster:loadRoster,player:initPlayer,saber:initSaber,news:loadNews})[t](el);
}

function showLoad(el){el.innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>'}
function showErr(el,m){el.innerHTML='<div class="err">'+esc(m)+'</div><div style="text-align:center;padding:8px"><button class="back-btn" onclick="loadTab(curTab)">Retry</button></div>'}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

async function api(path){const r=await fetch(API+path);if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}

// ========== TODAY ==========
async function loadToday(el){
  showLoad(el);
  try{
    const [sched,recent]=await Promise.all([
      api('/schedule').catch(()=>({data:[]})),
      api('/schedule/recent?days=7').catch(()=>({data:{games:[],record:''}}))
    ]);
    let h='';

    const sd=sched.data||sched;
    h+='<div class="card"><div class="card-head">Today\'s Game</div>';
    if(!sd||sd.length===0){
      h+='<div class="card-body"><div class="empty"><div class="empty-icon">⚾</div>No game scheduled today</div></div>';
    } else if(Array.isArray(sd)){
      sd.forEach(g=>{h+=renderGame(g)});
    } else if(typeof sd==='string'){
      h+='<div class="card-body"><div class="text-report">'+esc(sd)+'</div></div>';
    }
    h+='</div>';

    const rd=recent.data||recent;
    if(rd.games&&rd.games.length>0){
      h+='<div class="card"><div class="card-head">Recent Results</div>';
      rd.games.forEach(g=>{h+=renderGame(g)});
      if(rd.record){
        const rec=typeof rd.record==='object'?`W${rd.record.wins}-L${rd.record.losses} (${(rd.record.win_pct*100).toFixed(1)}%) ${rd.record.streak_text||''}`:String(rd.record);
        h+='<div class="card-body" style="text-align:center;font-weight:600;color:var(--blue)">'+esc(rec)+'</div>';
      }
      h+='</div>';
    }
    el.innerHTML=h;
  }catch(e){showErr(el,e.message)}
}

function renderGame(g){
  if(typeof g==='string') return '<div class="card-body"><div class="text-report">'+esc(g)+'</div></div>';
  if(g.away_team&&g.home_team){
    const isH=(g.home_team||'').includes('Dodgers');
    const aS=g.away_score??'-',hS=g.home_score??'-';
    const st=g.game_status||g.status||'Scheduled';
    const dScore=isH?hS:aS, oScore=isH?aS:hS;
    const won=typeof dScore==='number'&&typeof oScore==='number'&&dScore>oScore;
    const stClass=st.includes('Live')||st.includes('In Progress')?'s-live':st.includes('Final')||st.includes('Completed')?(won?'s-win':'s-loss'):'s-sched';
    const time=g.game_time||g.time||g.game_date||'';
    return `<div class="game">
      <div class="game-team"><div class="name">${esc(g.away_team)}</div></div>
      <div class="game-score"><span class="runs">${aS}</span><span class="at">-</span><span class="runs">${hS}</span></div>
      <div class="game-team${isH?' dodgers-highlight':''}"><div class="name">${esc(g.home_team)}</div></div>
      <div class="game-meta"><div class="status ${stClass}">${esc(st)}</div><div class="time">${esc(time)}</div></div>
    </div>`;
  }
  return '<div class="card-body"><div class="text-report">'+esc(JSON.stringify(g,null,2))+'</div></div>';
}

// ========== STANDINGS ==========
async function loadStandings(el){
  showLoad(el);
  try{
    const res=await api('/standings');
    const d=res.data||res;
    const raw=d.standings||d;
    const rank=d.dodgers_rank||'';
    let h='<div class="card"><div class="card-head">NL West Standings</div>';
    if(rank) h+='<div class="card-body" style="background:var(--blue-light);font-weight:600;color:var(--blue);text-align:center;font-size:13px">'+esc(rank)+'</div>';
    if(typeof raw==='string'){
      h+='<div class="card-body"><div class="standings-pre">'+esc(raw)+'</div></div>';
    } else if(Array.isArray(raw)){
      h+='<div class="card-body" style="padding:0;overflow-x:auto"><table style="width:100%;font-size:13px;border-collapse:collapse"><thead><tr>';
      const cols=Object.keys(raw[0]);
      cols.forEach(c=>{h+='<th style="text-align:left;padding:8px 10px;font-size:11px;color:var(--gray-500);border-bottom:1px solid var(--gray-200)">'+esc(c)+'</th>'});
      h+='</tr></thead><tbody>';
      raw.forEach(r=>{
        const isDod=(JSON.stringify(r)).includes('Dodgers');
        h+='<tr style="'+(isDod?'background:var(--blue-light);font-weight:600':'')+'">';
        cols.forEach(c=>{h+='<td style="padding:8px 10px;border-bottom:1px solid var(--gray-100)">'+esc(String(r[c]??'-'))+'</td>'});
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    } else {
      h+='<div class="card-body"><div class="text-report">'+esc(JSON.stringify(raw,null,2))+'</div></div>';
    }
    h+='</div>';
    el.innerHTML=h;
  }catch(e){showErr(el,e.message)}
}

// ========== ROSTER ==========
async function loadRoster(el,view){
  showLoad(el); view=view||rosterView;
  try{
    let data;
    if(view==='all'){data=(await api('/roster')).data}
    else if(view==='batting'){data=(await api('/roster/batting')).data}
    else{data=(await api('/roster/pitching')).data}
    let h='<div class="card"><div class="card-head">26-Man Roster</div>';
    h+='<div class="roster-filters">';
    ['all','batting','pitching'].forEach(v=>{
      const label={all:'All',batting:'Batters',pitching:'Pitchers'}[v];
      h+='<button class="'+(view===v?'active':'')+'" onclick="rosterView=\''+v+'\';loadRoster(document.getElementById(\'tab-roster\'),\''+v+'\')">'+label+'</button>';
    });
    h+='</div>';
    if(Array.isArray(data)){
      data.forEach(p=>{
        const name=p.fullName||p.name||p.Name||'';
        const pos=p.position||p.Position||p.pos||'';
        const num=p.jerseyNumber||p.number||p.jersey||'#';
        let stat='';
        if(view==='batting') stat=p.OPS||p.ops||p.avg||p.battingAvg||'';
        if(view==='pitching') stat=p.ERA||p.era||'';
        const statLabel=view==='pitching'?'ERA':view==='batting'?'OPS':'';
        h+=`<div class="player-row" onclick="goPlayer('${escA(name)}')">
          <div class="player-num">${esc(String(num))}</div>
          <div class="player-info"><div class="player-name">${esc(name)}</div>
          <div class="player-meta">${esc(pos)}${stat?' &middot; '+statLabel+' '+stat:''}</div></div>
          <div class="player-stat">${stat||''}</div></div>`;
      });
    } else if(typeof data==='string'){
      h+='<div class="card-body"><div class="text-report">'+esc(data)+'</div></div>';
    }
    h+='</div>';
    el.innerHTML=h;
  }catch(e){showErr(el,e.message)}
}

// ========== PLAYER ==========
function initPlayer(el){
  el.innerHTML='<div class="card"><div class="card-head">Player Search</div><div class="search-wrap"><input class="search-input" id="pi" placeholder="Name or MLB ID (e.g. Ohtani, Betts, Freeman...)" onkeydown="if(event.key===\'Enter\')doSearch()"></div><div id="pr"></div></div>';
  setTimeout(()=>{const i=document.getElementById('pi');if(i)i.focus()},100);
}

async function doSearch(){
  const i=document.getElementById('pi'),r=document.getElementById('pr');
  if(!i||!i.value.trim())return;
  const name=i.value.trim();
  r.innerHTML='<div class="loading" style="padding:24px"><div class="spinner"></div></div>';
  try{
    const res=await api('/player/'+encodeURIComponent(name));
    const p=res.data||res;
    r.innerHTML=renderProfile(p);
  }catch(e){r.innerHTML='<div class="err">Player not found.<br><small>Try full name like "Shohei Ohtani"</small></div>'}
}

function goPlayer(name){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-tab="player"]').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('tab-player');el.classList.add('active');
  curTab='player';
  initPlayer(el);
  setTimeout(()=>{const i=document.getElementById('pi');if(i){i.value=name;doSearch()}},80);
}

function renderProfile(p){
  if(!p||typeof p!=='object') return '<div class="empty">No data</div>';
  const name=p.fullName||p.name||p.Name||'Unknown';
  const team=p.currentTeam||p.team||p.Team||'';
  const pos=p.primaryPosition||p.position||p.Position||'';
  const num=p.jerseyNumber||p.primaryNumber||p.number||'';
  const bats=p.batSide||p.bats||'',throws=p.throwSide||p.throws||'';
  const ht=p.height||'',wt=p.weight||'',age=p.age||p.currentAge||'';
  const bd=p.birthDate||p.birth_date||p.dob||'';
  const bc=p.birthCity||p.birth_city||'',bco=p.birthCountry||p.birth_country||'';
  const debut=p.mlbDebut||p.debut||p.mlb_debut||'';
  const draft=p.draftYear||p.draft_year||'';

  let h=`<div class="card" style="overflow:visible"><div class="profile-hero"><div class="num">#${esc(String(num))}</div><div class="pname">${esc(name)}</div><div class="pteam">${esc(team)}${pos?' &middot; '+esc(pos):''}</div></div>`;
  h+='<div class="profile-grid">';

  const info=[['B/T',(bats||'-')+' / '+(throws||'-')],['HT/WT',(ht&&wt)?ht+' / '+wt+' lbs':'-'],['Age',age||'-'],['Born',bd+(bc?', '+bc:'')],['Country',bco||'-']];
  if(debut)info.push(['MLB Debut',debut]);
  if(draft)info.push(['Draft',String(draft)]);
  info.forEach(([l,v])=>{h+='<div class="profile-cell"><div class="lbl">'+l+'</div><div class="val">'+esc(v)+'</div></div>'});
  h+='</div>';

  const season=p.seasonStats||p.season_stats;
  if(season&&typeof season==='object'&&Object.keys(season).length>0){
    h+='<div style="border-top:1px solid var(--gray-200);padding:8px 16px 4px;font-size:11px;font-weight:600;color:var(--gray-500)">2025 Season</div>';
    h+='<div class="profile-stats-bar">';
    Object.entries(season).filter(([k])=>!['team','season','sport'].includes(k)).slice(0,6).forEach(([k,v])=>{
      h+='<div class="profile-stat"><div class="n">'+esc(String(v??'-'))+'</div><div class="t">'+esc(k)+'</div></div>';
    });
    h+='</div>';
  }

  const career=p.careerStats||p.career||p.career_totals;
  if(career&&typeof career==='object'&&Object.keys(career).length>0){
    h+='<div style="border-top:1px solid var(--gray-200);padding:8px 16px 4px;font-size:11px;font-weight:600;color:var(--gray-500)">Career</div>';
    h+='<div class="profile-stats-bar">';
    Object.entries(career).filter(([k])=>!['team','season','sport','split'].includes(k)).slice(0,6).forEach(([k,v])=>{
      h+='<div class="profile-stat"><div class="n">'+esc(String(v??'-'))+'</div><div class="t">'+esc(k)+'</div></div>';
    });
    h+='</div>';
  }
  h+='</div>';

  const yby=p.yearByYear||p.year_by_year;
  if(Array.isArray(yby)&&yby.length>0){
    h+='<div class="card"><div class="card-head">Year by Year</div><div class="card-body" style="padding:0;overflow-x:auto"><table style="width:100%;font-size:12px;border-collapse:collapse"><thead><tr><th style="padding:6px 10px;font-size:11px;color:var(--gray-500);text-align:left">Year</th><th style="padding:6px 10px;font-size:11px;color:var(--gray-500);text-align:left">Team</th>';
    const sk=Object.keys(yby[0]).filter(k=>!['season','team','sport','teamName','teamNameShort','teamAbbrev'].includes(k)).slice(0,7);
    sk.forEach(k=>{h+='<th style="padding:6px 10px;font-size:11px;color:var(--gray-500);text-align:left">'+esc(k)+'</th>'});
    h+='</tr></thead><tbody>';
    yby.slice().reverse().forEach(r=>{
      h+='<tr>';
      h+='<td style="padding:6px 10px;border-top:1px solid var(--gray-100)">'+esc(String(r.season||'-'))+'</td>';
      h+='<td style="padding:6px 10px;border-top:1px solid var(--gray-100)">'+esc(r.teamAbbrev||r.team||r.teamNameShort||'-')+'</td>';
      sk.forEach(k=>{h+='<td style="padding:6px 10px;border-top:1px solid var(--gray-100)">'+esc(String(r[k]??'-'))+'</td>'});
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
  }
  return h;
}

// ========== SABERMETRICS ==========
function initSaber(el){
  el.innerHTML='<div class="card"><div class="card-head">Sabermetrics</div><div class="card-body">Loading team advanced analysis...</div></div>';
  api('/report/advanced').then(res=>{
    const d=res.data||res;
    const rpt=d.report||d;
    el.innerHTML='<div class="card"><div class="card-head">Advanced Analysis</div><div class="card-body"><div class="text-report">'+esc(typeof rpt==='string'?rpt:JSON.stringify(rpt,null,2))+'</div></div></div>';
  }).catch(e=>{el.querySelector('.card-body').innerHTML='<div class="err">Failed to load</div>'});
}

// ========== NEWS ==========
async function loadNews(el){
  showLoad(el);
  try{
    const res=await api('/news?count=10');
    const arts=res.data||res;
    let h='<div class="card"><div class="card-head">Latest News</div>';
    if(Array.isArray(arts)){
      arts.forEach(a=>{
        const title=a.title||a.Title||'';
        const date=a.published||a.date||a.pubDate||a.Date||'';
        const link=a.link||a.url||a.Link||'#';
        const sum=a.summary||a.description||'';
        h+=`<a href="${escA(link)}" target="_blank" rel="noopener" class="news-row"><div class="news-title">${esc(title)}</div>${sum?'<div class="news-date">'+esc(sum.substring(0,120))+(sum.length>120?'...':'')+'</div>':''}<div class="news-date">${esc(date)}</div></a>`;
      });
    } else {
      h+='<div class="card-body"><div class="text-report">'+esc(typeof arts==='string'?arts:JSON.stringify(arts,null,2))+'</div></div>';
    }
    h+='</div>';
    el.innerHTML=h;
  }catch(e){showErr(el,e.message)}
}

function escA(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

loadTab('today');
</script>
